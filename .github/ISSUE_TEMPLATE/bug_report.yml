name: Bug Report
description: Report a bug in TSC Bridge
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: TSC Bridge Version
      description: Run `tsc-bridge --version` to get the version.
      placeholder: "3.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows 10
        - Windows 11
        - Ubuntu / Debian
        - Fedora / RHEL
        - Other Linux
    validations:
      required: true

  - type: input
    id: printer
    attributes:
      label: Printer Model
      description: The thermal printer model you are using.
      placeholder: "TSC TDP-244 Plus"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output from the bridge console.
      render: text
