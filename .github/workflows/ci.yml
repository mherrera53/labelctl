name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-latest
            tags: ""
          - os: ubuntu-latest
            tags: "-tags crossbuild"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libgtk-3-dev libappindicator3-dev

      - name: Build
        run: go build ${{ matrix.tags }} ./...

      - name: Test
        run: go test ${{ matrix.tags }} ./...

      - name: Vet
        run: go vet ${{ matrix.tags }} ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libgtk-3-dev libappindicator3-dev

      - name: Lint with go vet
        run: go vet -tags crossbuild ./...
