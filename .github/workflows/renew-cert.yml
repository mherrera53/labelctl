name: Renew Certificate

on:
  schedule:
    - cron: '0 6 1 * *'  # First day of every month at 6am UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lego
        run: |
          curl -sL https://github.com/go-acme/lego/releases/latest/download/lego_linux_amd64.tar.gz | tar xz
          sudo mv lego /usr/local/bin/

      - name: Renew certificate
        env:
          CLOUDFLARE_DNS_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
        run: |
          lego --email="herrera.monterroso.mario@gmail.com" \
            --dns cloudflare \
            --domains="local.labelctl.dev" \
            --accept-tos \
            --path="./.lego" \
            run

      - name: Update GitHub secrets with new cert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh secret set LABELCTL_CERT < .lego/certificates/local.labelctl.dev.crt
          gh secret set LABELCTL_KEY < .lego/certificates/local.labelctl.dev.key
          echo "Secrets updated with renewed certificate"
