name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: tsc-bridge-mac
            cgo: 1
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: tsc-bridge.exe
            cgo: 1
          - os: windows-latest
            goos: windows
            goarch: 386
            binary: tsc-bridge-32.exe
            cgo: 1
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: tsc-bridge-linux-amd64
            cgo: 1

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install libusb (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libgtk-3-dev libappindicator3-dev

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: ${{ matrix.goarch == '386' && 'x86' || 'x64' }}

      - name: Inject Let's Encrypt certificate
        env:
          LABELCTL_CERT: ${{ secrets.LABELCTL_CERT }}
          LABELCTL_KEY: ${{ secrets.LABELCTL_KEY }}
        run: |
          if [ -n "$LABELCTL_CERT" ] && [ -n "$LABELCTL_KEY" ]; then
            echo "$LABELCTL_CERT" > certs/server.crt
            echo "$LABELCTL_KEY" > certs/server.key
            echo "Real Let's Encrypt cert injected"
          else
            echo "No cert secrets found — using placeholder"
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          LDFLAGS="-s -w"
          if [ "$RUNNER_OS" = "macOS" ] && command -v pkg-config &>/dev/null; then
            export CGO_CFLAGS="$(pkg-config --cflags libusb-1.0)"
            export CGO_LDFLAGS="$(pkg-config --libs libusb-1.0)"
          fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            LDFLAGS="$LDFLAGS -H windowsgui"
          fi
          go build -ldflags="$LDFLAGS" -o ${{ matrix.binary }} .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
